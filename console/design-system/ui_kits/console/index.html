<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Toss Invest Console</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>html,body{margin:0;padding:0;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="Shell.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="StockDetailScreen.jsx"></script>
<script type="text/babel" src="AccountScreen.jsx"></script>
<script type="text/babel">
  function App() {
    const [route, setRoute] = React.useState({ screen: "home" });
    const onPickStock = (stock) => setRoute({ screen: "detail", stock });
    return (
      <Shell active={route.screen === "detail" ? "home" : route.screen}
             onNav={(id) => setRoute({ screen: id })}
             onPickStock={onPickStock}>
        {route.screen === "home" && <HomeScreen onPickStock={onPickStock} />}
        {route.screen === "detail" && <StockDetailScreen stock={route.stock} />}
        {route.screen === "account" && <AccountScreen onPickStock={onPickStock} />}
        {route.screen === "news" && <PlaceholderScreen title="뉴스" />}
        {route.screen === "discover" && <PlaceholderScreen title="발견" />}
      </Shell>
    );
  }
  function PlaceholderScreen({ title }) {
    return <Card><div className="h3" style={{ marginBottom: 8 }}>{title}</div><div className="body" style={{ color: "var(--fg-secondary)" }}>이 영역은 데모 범위 밖이에요.</div></Card>;
  }
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
