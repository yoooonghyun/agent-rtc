<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing · Tokens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:12px; color:var(--fg-secondary); font-family:var(--font-mono); }
  .key { width:80px; }
  .bar { height:14px; background: var(--toss-blue-500); border-radius:3px; }
</style></head>
<body>
<div class="row"><div class="key">space-1</div><div class="bar" style="width:4px"></div><span>4 px</span></div>
<div class="row"><div class="key">space-2</div><div class="bar" style="width:8px"></div><span>8 px</span></div>
<div class="row"><div class="key">space-3</div><div class="bar" style="width:12px"></div><span>12 px</span></div>
<div class="row"><div class="key">space-4</div><div class="bar" style="width:16px"></div><span>16 px</span></div>
<div class="row"><div class="key">space-5</div><div class="bar" style="width:20px"></div><span>20 px</span></div>
<div class="row"><div class="key">space-6</div><div class="bar" style="width:24px"></div><span>24 px</span></div>
<div class="row"><div class="key">space-8</div><div class="bar" style="width:32px"></div><span>32 px</span></div>
<div class="row"><div class="key">space-10</div><div class="bar" style="width:40px"></div><span>40 px</span></div>
<div class="row"><div class="key">space-12</div><div class="bar" style="width:48px"></div><span>48 px</span></div>
<div class="row"><div class="key">space-16</div><div class="bar" style="width:64px"></div><span>64 px</span></div>
</body></html>
