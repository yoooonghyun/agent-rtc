<!doctype html>
<html><head><meta charset="utf-8"><title>Tabs & Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .tabs { display:flex; gap:4px; border-bottom:1px solid var(--grey-100); margin-bottom:16px; }
  .tab { padding:14px 4px; margin-right:20px; font-weight:600; color: var(--fg-tertiary); border-bottom: 2px solid transparent; cursor:pointer; font-size:15px; }
  .tab.active { color: var(--fg-primary); border-bottom-color: var(--fg-primary); }
  .seg { display:inline-flex; background: var(--grey-100); padding:4px; border-radius:999px; }
  .seg-item { padding:6px 14px; border-radius:999px; font-size:13px; font-weight:600; color: var(--fg-secondary); cursor:pointer; }
  .seg-item.active { background:#fff; color: var(--fg-primary); box-shadow: var(--shadow-sm); }
  .chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:14px; }
  .chip { padding:6px 12px; border-radius:999px; background: var(--grey-100); color: var(--fg-secondary); font-size:12.5px; font-weight:500; }
  .chip.active { background: var(--toss-blue-50); color: var(--brand); }
</style></head>
<body>
<div class="tabs">
  <div class="tab active">홈</div>
  <div class="tab">뉴스</div>
  <div class="tab">발견</div>
  <div class="tab">내 계좌</div>
</div>
<div class="seg">
  <div class="seg-item active">1일</div>
  <div class="seg-item">1주</div>
  <div class="seg-item">3개월</div>
  <div class="seg-item">1년</div>
  <div class="seg-item">최대</div>
</div>
<div class="chips">
  <div class="chip active">전체</div>
  <div class="chip">반도체</div>
  <div class="chip">2차전지</div>
  <div class="chip">바이오</div>
  <div class="chip">AI</div>
  <div class="chip">자동차</div>
</div>
</body></html>
