<!doctype html>
<html><head><meta charset="utf-8"><title>Radii & Shadow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--grey-50); font-family: var(--font-sans); }
  .grid { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; }
  .tile { background:#fff; border:1px solid var(--grey-100); aspect-ratio:1; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; box-sizing:border-box; font-size:10.5px; font-family:var(--font-mono); color:var(--fg-secondary); }
  .label { color:var(--fg-primary); font-weight:600; font-family: var(--font-sans); font-size:11px; }
  .row2 { display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:14px; }
  .shtile { background:#fff; border-radius:14px; height:64px; padding:10px 14px; font-size:11px; font-family:var(--font-mono); color:var(--fg-secondary); display:flex; flex-direction:column; justify-content:center; }
</style></head>
<body>
<div class="grid">
  <div class="tile" style="border-radius:6px"><div class="label">sm</div>6px</div>
  <div class="tile" style="border-radius:10px"><div class="label">md</div>10px</div>
  <div class="tile" style="border-radius:12px"><div class="label">lg</div>12px</div>
  <div class="tile" style="border-radius:16px"><div class="label">xl</div>16px</div>
  <div class="tile" style="border-radius:20px"><div class="label">2xl</div>20px</div>
  <div class="tile" style="border-radius:999px"><div class="label">pill</div>999</div>
</div>
<div class="row2">
  <div class="shtile" style="box-shadow:var(--shadow-sm)"><div class="label" style="color:var(--fg-primary);font-weight:600;font-family:var(--font-sans);font-size:11px">shadow-sm</div>card hover</div>
  <div class="shtile" style="box-shadow:var(--shadow-md)"><div class="label" style="color:var(--fg-primary);font-weight:600;font-family:var(--font-sans);font-size:11px">shadow-md</div>popovers</div>
  <div class="shtile" style="box-shadow:var(--shadow-lg)"><div class="label" style="color:var(--fg-primary);font-weight:600;font-family:var(--font-sans);font-size:11px">shadow-lg</div>modals</div>
</div>
</body></html>
