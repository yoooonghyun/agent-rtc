<!doctype html>
<html><head><meta charset="utf-8"><title>Brand · AgentRTC Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; }
  .tile { border:1px solid var(--grey-100); border-radius:14px; padding:18px; display:flex; align-items:center; justify-content:center; min-height:96px; }
  .tile.dark { background:var(--grey-900); border-color:var(--grey-900); }
  .tile img { height:44px; }
  .mark { height:64px; }
  .note { color: var(--fg-tertiary); font-size:11px; margin-top:10px; font-family:var(--font-mono); }
</style></head>
<body>
<div class="row">
  <div class="tile"><img src="../assets/logo-agentrtc.svg" alt="AgentRTC"></div>
  <div class="tile dark">
    <img src="../assets/logo-agentrtc-dark.svg" alt="AgentRTC dark">
  </div>
  <div class="tile"><img class="mark" src="../assets/logo-agentrtc-mark.svg" alt="AgentRTC mark"></div>
</div>
<div class="note">말풍선(낮춤) + 로봇(키움).</div>
</body></html>
