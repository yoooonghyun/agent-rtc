<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .stack { display:flex; flex-direction:column; gap:10px; max-width:560px; }
  .field { display:flex; flex-direction:column; gap:6px; }
  .label { font-size:12px; font-weight:600; color: var(--fg-secondary); }
  .input { font:inherit; padding:12px 14px; border-radius:12px; border:1px solid var(--grey-200); background:#fff; font-size:15px; outline:none; transition: border-color var(--dur-fast); }
  .input:focus { border-color: var(--brand); box-shadow: var(--shadow-focus); }
  .input::placeholder { color: var(--fg-placeholder); }
  .search { position:relative; }
  .search .input { padding-left:40px; background: var(--grey-50); border-color:transparent; }
  .search svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); color: var(--fg-tertiary); }
  .err { color: var(--up-500); font-size:12px; }
</style></head>
<body>
<div class="stack">
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
    <input class="input" placeholder="종목명 또는 티커 검색"/>
  </div>
  <div class="field">
    <div class="label">주문 수량</div>
    <input class="input num" value="10"/>
  </div>
  <div class="field">
    <div class="label">지정가 (KRW)</div>
    <input class="input num" placeholder="84,200" style="border-color:var(--brand); box-shadow:var(--shadow-focus);"/>
  </div>
</div>
</body></html>
