<!doctype html>
<html><head><meta charset="utf-8"><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-bottom:10px; }
  .btn { font-family: inherit; font-weight:600; border:none; border-radius:10px; padding:10px 16px; font-size:14px; cursor:pointer; transition: background var(--dur-fast) var(--ease-out); }
  .btn-primary { background: var(--brand); color:#fff; }
  .btn-primary:hover { background: var(--brand-hover); }
  .btn-secondary { background: var(--grey-100); color: var(--grey-900); }
  .btn-secondary:hover { background: var(--grey-200); }
  .btn-ghost { background: transparent; color: var(--brand); }
  .btn-ghost:hover { background: var(--brand-tint); }
  .btn-up { background: var(--up-500); color:#fff; }
  .btn-down { background: var(--down-500); color:#fff; }
  .btn-lg { padding:14px 22px; font-size:16px; border-radius:12px; }
  .btn-sm { padding:6px 10px; font-size:12px; border-radius:8px; }
  .btn-pill { border-radius:999px; }
</style></head>
<body>
<div class="row">
  <button class="btn btn-primary btn-lg">매수하기</button>
  <button class="btn btn-secondary btn-lg">관심 종목 추가</button>
  <button class="btn btn-ghost btn-lg">자세히 보기</button>
</div>
<div class="row">
  <button class="btn btn-up">▲ 매수 Buy</button>
  <button class="btn btn-down">▼ 매도 Sell</button>
  <button class="btn btn-primary">Confirm order</button>
  <button class="btn btn-secondary">Cancel</button>
</div>
<div class="row">
  <button class="btn btn-secondary btn-pill btn-sm">전체</button>
  <button class="btn btn-primary btn-pill btn-sm">국내</button>
  <button class="btn btn-secondary btn-pill btn-sm">해외</button>
  <button class="btn btn-secondary btn-pill btn-sm">ETF</button>
</div>
</body></html>
