<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Display & Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:18px 20px; background:#fff; }
  .stack { display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; align-items:baseline; gap:14px; }
  .meta { width:120px; flex-shrink:0; color: var(--fg-tertiary); font-size:11px; font-family:var(--font-mono); }
</style></head>
<body>
<div class="stack">
  <div class="row"><div class="meta">display · 44/700</div><div class="display">투자의 힘을 모두에게</div></div>
  <div class="row"><div class="meta">h1 · 32/700</div><div class="h1">Stocks to watch today</div></div>
  <div class="row"><div class="meta">h2 · 26/700</div><div class="h2">My account</div></div>
  <div class="row"><div class="meta">h3 · 21/600</div><div class="h3">삼성전자 · Samsung Electronics</div></div>
  <div class="row"><div class="meta">h4 · 18/600</div><div class="h4">Recently viewed</div></div>
</div>
</body></html>
