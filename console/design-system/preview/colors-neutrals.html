<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; gap:6px; }
  .swatch { flex:1; border-radius:10px; aspect-ratio: 1/1.05; padding:10px; display:flex; flex-direction:column; justify-content:space-between; box-sizing:border-box; border:1px solid var(--grey-100); }
  .top { font-size:11px; font-weight:600; }
  .hex { font-family:var(--font-mono); font-size:10px; opacity:.85; }
</style></head>
<body>
<div class="row">
  <div class="swatch" style="background:#fff"><div class="top">0</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch" style="background:var(--grey-50)"><div class="top">50</div><div class="hex">#F9FAFB</div></div>
  <div class="swatch" style="background:var(--grey-100)"><div class="top">100</div><div class="hex">#F2F4F6</div></div>
  <div class="swatch" style="background:var(--grey-200)"><div class="top">200</div><div class="hex">#E5E8EB</div></div>
  <div class="swatch" style="background:var(--grey-300)"><div class="top">300</div><div class="hex">#D1D6DB</div></div>
  <div class="swatch" style="background:var(--grey-400); color:#fff"><div class="top">400</div><div class="hex">#B0B8C1</div></div>
  <div class="swatch" style="background:var(--grey-500); color:#fff"><div class="top">500</div><div class="hex">#8B95A1</div></div>
  <div class="swatch" style="background:var(--grey-600); color:#fff"><div class="top">600</div><div class="hex">#6B7684</div></div>
  <div class="swatch" style="background:var(--grey-700); color:#fff"><div class="top">700</div><div class="hex">#4E5968</div></div>
  <div class="swatch" style="background:var(--grey-800); color:#fff"><div class="top">800</div><div class="hex">#333D4B</div></div>
  <div class="swatch" style="background:var(--grey-900); color:#fff"><div class="top">900</div><div class="hex">#191F28</div></div>
</div>
</body></html>
