<!doctype html>
<html><head><meta charset="utf-8"><title>Color · Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#fff; font-family: var(--font-sans); }
  .row { display:flex; gap:8px; }
  .swatch { flex:1; border-radius:10px; aspect-ratio: 1.6/1; padding:10px 12px; display:flex; flex-direction:column; justify-content:flex-end; box-sizing:border-box; }
  .label { font-size:11px; font-weight:600; line-height:1.2; }
  .hex { font-family:var(--font-mono); font-size:10.5px; opacity:.85; margin-top:2px; }
  .core { aspect-ratio: 3.2/1; }
</style></head>
<body>
<div class="swatch core" style="background:var(--toss-blue-500); color:#fff; margin-bottom:8px;">
  <div class="label">Toss Blue · brand / 500</div>
  <div class="hex">#3182F6</div>
</div>
<div class="row">
  <div class="swatch" style="background:var(--toss-blue-50);"><div class="label">50</div><div class="hex">#EDF4FE</div></div>
  <div class="swatch" style="background:var(--toss-blue-100);"><div class="label">100</div><div class="hex">#D8E8FE</div></div>
  <div class="swatch" style="background:var(--toss-blue-300); color:#fff;"><div class="label">300</div><div class="hex">#7FB0FB</div></div>
  <div class="swatch" style="background:var(--toss-blue-500); color:#fff;"><div class="label">500</div><div class="hex">#3182F6</div></div>
  <div class="swatch" style="background:var(--toss-blue-600); color:#fff;"><div class="label">600</div><div class="hex">#1B64DA</div></div>
  <div class="swatch" style="background:var(--toss-blue-800); color:#fff;"><div class="label">800</div><div class="hex">#174486</div></div>
</div>
</body></html>
