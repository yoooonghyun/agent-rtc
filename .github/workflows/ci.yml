name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            console/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install console dependencies
        working-directory: console
        run: npm ci

      - name: Lint (root + console)
        run: npm run lint

      - name: Typecheck (root + console)
        run: npm run typecheck
